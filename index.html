<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-3 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .score-board {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍬 Match-3 Game</h1>
        <div class="score-board">
            Score: <span id="score">0</span> | Target: <span id="target">1200</span>
        </div>
        <div id="game-grid" style="display: grid; grid-template-columns: repeat(8, 50px); gap: 5px; justify-content: center;">
            <!-- Grid will be generated by JavaScript -->
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
