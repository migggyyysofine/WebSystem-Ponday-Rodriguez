<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-3 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .score-board {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        .tile {
    transition: all 0.1s ease;
}

.tile:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
}

.tile:active {
    transform: scale(0.95);
}

@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); background-color: #ffd700; }
    100% { transform: scale(1); }
}

.match-animation {
    animation: pop 0.2s ease;
}

.status-message {
    margin-top: 20px;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
    transition: all 0.3s ease;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}
@media (max-width: 600px) {
    #game-grid {
        grid-template-columns: repeat(8, 35px) !important;
        gap: 3px !important;
    }
    
    .tile, #game-grid div {
        width: 35px !important;
        height: 35px !important;
        font-size: 20px !important;
    }
    
    h1 { font-size: 24px; }
    .score-board { font-size: 16px; }
    button { padding: 8px 16px; font-size: 14px; }
}

@media (max-width: 400px) {
    #game-grid {
        grid-template-columns: repeat(8, 30px) !important;
    }
    
    .tile, #game-grid div {
        width: 30px !important;
        height: 30px !important;
        font-size: 16px !important;
    }
}
    </style>
</head>
<body>
    <!-- Start Menu -->
<div id="startMenu" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 20px; text-align: center; color: white;">
        <h1 style="font-size: 48px; margin-bottom: 20px;">🍬 MATCH-3</h1>
        <p style="font-size: 18px; margin-bottom: 30px;">Swap adjacent tiles to match 3 or more!<br>Chain reactions = bonus points!</p>
        <div style="font-size: 24px; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.2); border-radius: 10px;">
            Press <kbd style="background: white; color: black; padding: 5px 10px; border-radius: 5px;">ENTER</kbd> to Start
        </div>
        <button id="startButton" style="padding: 15px 40px; font-size: 20px;">▶ PLAY NOW</button>
    </div>
</div>
    <div class="game-container">
        <h1>🍬 Match-3 Game</h1>
        <div class="score-board">
            Score: <span id="score">0</span> | Target: <span id="target">1200</span>
        </div>
        <button onclick="location.reload()">🔄 New Game</button>
        <div id="game-grid" style="display: grid; grid-template-columns: repeat(8, 50px); gap: 5px; justify-content: center;">
            <!-- Grid will be generated by JavaScript -->
        </div>
        <button id="menuButton" style="margin-left: 10px;">🏠 Menu</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
