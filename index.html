<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Match-3 Game | Progressive Levels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c2c2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            text-align: center;
            background: #3a3a3a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .score-board {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 10px;
            background: #4a4a4a;
            border-radius: 10px;
            font-weight: bold;
            color: #f0f0f0;
        }
        
        .level-info {
            font-size: 18px;
            margin-bottom: 10px;
            color: #f9a825;
            font-weight: bold;
        }
        
        #game-grid {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            gap: 5px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .tile {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border-radius: 12px;
            cursor: pointer;
            font-size: 28px;
            transition: all 0.1s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        
        .tile:hover {
            transform: scale(1.05);
            filter: brightness(0.95);
        }
        
        .tile:active {
            transform: scale(0.95);
        }
        
        .tile.selected {
            box-shadow: 0 0 0 3px #f9a825, 0 0 0 6px #ff6f00;
            transform: scale(0.98);
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); filter: brightness(1.1); }
            100% { transform: scale(1); }
        }
        
        .match-animation {
            animation: pop 0.2s ease;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            background: #4a4a4a;
            color: #f0f0f0;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button.reset-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        button.menu-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        @media (max-width: 600px) {
            #game-grid {
                grid-template-columns: repeat(8, 35px) !important;
                gap: 3px !important;
            }
            .tile {
                width: 35px !important;
                height: 35px !important;
                font-size: 20px !important;
            }
            h1 { font-size: 24px; }
            .score-board { font-size: 16px; }
            button { padding: 8px 16px; font-size: 14px; }
        }
        
        @media (max-width: 400px) {
            #game-grid {
                grid-template-columns: repeat(8, 30px) !important;
                gap: 2px !important;
            }
            .tile {
                width: 30px !important;
                height: 30px !important;
                font-size: 20px !important;
            }
        }
        
        .start-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .start-card {
            background: #3a3a3a;
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #5a5a5a;
        }
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .start-card h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #f9a825 0%, #ff6f00 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        
        .start-card p {
            color: #cccccc;
            font-size: 18px;
            margin: 20px 0;
        }
        
        .enter-hint {
            background: #4a4a4a;
            padding: 12px;
            border-radius: 30px;
            margin: 20px auto;
            display: inline-block;
            font-size: 14px;
            color: #dddddd;
        }
        
        kbd {
            background: #222;
            color: #f9a825;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: bold;
            margin: 0 4px;
        }
        
        .play-btn {
            background: linear-gradient(135deg, #f9a825 0%, #ff6f00 100%);
            font-size: 22px;
            padding: 14px 32px;
            border-radius: 40px;
            margin-top: 20px;
            color: white;
        }
        
        .hidden-menu {
            display: none !important;
        }
        
        .level-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .level-modal.hidden-modal {
            display: none;
        }
        
        .level-card {
            background: #3a3a3a;
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid #5a5a5a;
        }
        
        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            80% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .level-card h2 {
            font-size: 36px;
            color: #f9a825;
            margin-bottom: 16px;
        }
        
        .level-card .level-badge {
            font-size: 64px;
            margin: 20px 0;
        }
        
        .level-card p {
            font-size: 20px;
            color: #e0e0e0;
            margin: 15px 0;
        }
        
        .level-card .next-target {
            font-size: 28px;
            font-weight: bold;
            color: #f9a825;
            background: #4a4a4a;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 15px 0;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .modal-buttons button {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .continue-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }
        
        .menu-modal-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .out-of-moves-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
        }
        
        .out-of-moves-card {
            background: #3a3a3a;
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            max-width: 380px;
            width: 85%;
            border: 1px solid #f5576c;
            animation: bounceIn 0.4s ease;
        }
        
        .out-of-moves-card h2 {
            color: #f5576c;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .out-of-moves-card .emoji {
            font-size: 64px;
            margin: 20px 0;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-top: 20px;
            padding: 12px 28px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="startMenu" class="start-menu">
    <div class="start-card">
        <h1> HANAPIN MO ANG KAPAREHAS KO BEYBE! </h1>
        <p>Match 3 or more identical fruits!<br>Game by Ponday & Rodriguez</p>
        <div class="enter-hint">
            Press <kbd>ENTER</kbd> to Start
        </div>
        <button class="play-btn" id="startButton">▶ PLAY NOW</button>
    </div>
</div>

<div id="levelModal" class="level-modal hidden-modal">
    <div class="level-card">
        <div class="level-badge">🏆🎉</div>
        <h2>LEVEL COMPLETE!</h2>
        <p id="levelCompleteMsg">You reached the target!</p>
        <div class="next-target">
            Next Goal: <span id="nextTargetSpan">2500</span> points
        </div>
        <div class="modal-buttons">
            <button id="continueGameBtn" class="continue-btn">▶ NEXT LEVEL</button>
            <button id="menuFromModalBtn" class="menu-modal-btn">🏠 START FROM MENU</button>
        </div>
    </div>
</div>

<div class="game-container">
    <h1> HANAPIN MO ANG KAPAREHAS KO BEYBE! </h1>
    <div class="level-info">
        🌟 LEVEL <span id="levelNumber">1</span> 🌟
    </div>
    <div class="score-board">
        Score: <span id="score">0</span> | Target: <span id="target">1500</span>
    </div>
    
    <div id="game-grid"></div>
    
    <div id="statusMessage" class="status-message">✨ Tap fruits to match! ✨</div>
    
    <div class="button-group">
        <button id="resetButton" class="reset-btn">🔄 New Game</button>
        <button id="menuButton" class="menu-btn">🏠 Menu</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
